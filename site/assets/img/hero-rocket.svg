<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" fill="none">
  <!-- Stars -->
  <circle cx="50" cy="80" r="1.5" fill="#22d3ee" opacity="0.6"/>
  <circle cx="120" cy="30" r="1" fill="white" opacity="0.4"/>
  <circle cx="200" cy="60" r="2" fill="#22d3ee" opacity="0.5"/>
  <circle cx="300" cy="20" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="400" cy="50" r="1" fill="#22d3ee" opacity="0.6"/>
  <circle cx="480" cy="90" r="2" fill="white" opacity="0.4"/>
  <circle cx="550" cy="30" r="1.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="560" cy="150" r="1" fill="white" opacity="0.3"/>
  <circle cx="30" cy="200" r="1.5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="580" cy="250" r="1" fill="white" opacity="0.5"/>
  <circle cx="80" cy="350" r="2" fill="#22d3ee" opacity="0.3"/>
  <circle cx="520" cy="380" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="160" cy="420" r="1" fill="#22d3ee" opacity="0.5"/>
  <circle cx="440" cy="460" r="2" fill="white" opacity="0.3"/>
  <circle cx="70" cy="550" r="1.5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="530" cy="600" r="1" fill="white" opacity="0.5"/>

  <!-- Orbit rings (decorative) -->
  <ellipse cx="300" cy="340" rx="220" ry="60" stroke="rgba(34,211,238,0.08)" stroke-width="1" stroke-dasharray="6 4"/>
  <ellipse cx="300" cy="340" rx="160" ry="44" stroke="rgba(34,211,238,0.06)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Rocket body -->
  <g transform="translate(195, 60)">
    <!-- Glow behind rocket -->
    <ellipse cx="105" cy="300" rx="80" ry="40" fill="rgba(34,211,238,0.08)"/>

    <!-- Flame outer -->
    <path d="M80 480 Q90 560 105 600 Q120 560 130 480 Q115 500 105 490 Q95 500 80 480Z" fill="url(#flameOuter)" opacity="0.8"/>
    <!-- Flame inner -->
    <path d="M88 478 Q97 535 105 565 Q113 535 122 478 Q113 492 105 485 Q97 492 88 478Z" fill="url(#flameInner)" opacity="0.9"/>

    <!-- Left fin -->
    <path d="M60 400 L20 460 L60 450 Z" fill="url(#finGrad)" opacity="0.9"/>
    <!-- Right fin -->
    <path d="M150 400 L190 460 L150 450 Z" fill="url(#finGrad)" opacity="0.9"/>

    <!-- Body -->
    <rect x="65" y="200" width="80" height="260" rx="8" fill="url(#bodyGrad)"/>

    <!-- Body highlight -->
    <rect x="72" y="210" width="18" height="240" rx="4" fill="rgba(255,255,255,0.06)"/>

    <!-- Nose cone -->
    <path d="M65 200 Q65 100 105 40 Q145 100 145 200 Z" fill="url(#noseGrad)"/>

    <!-- Nose highlight -->
    <path d="M73 200 Q72 120 105 65 Q115 110 115 200 Z" fill="rgba(255,255,255,0.06)"/>

    <!-- Window -->
    <circle cx="105" cy="270" r="28" fill="url(#windowBg)" stroke="rgba(34,211,238,0.4)" stroke-width="2"/>
    <circle cx="105" cy="270" r="22" fill="url(#windowInner)"/>
    <circle cx="98" cy="263" r="6" fill="rgba(255,255,255,0.15)"/>

    <!-- Body details -->
    <line x1="65" y1="310" x2="145" y2="310" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
    <line x1="65" y1="330" x2="145" y2="330" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
    <line x1="65" y1="380" x2="145" y2="380" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>

    <!-- Side boosters -->
    <rect x="35" y="340" width="30" height="80" rx="15" fill="url(#boosterGrad)" opacity="0.85"/>
    <rect x="145" y="340" width="30" height="80" rx="15" fill="url(#boosterGrad)" opacity="0.85"/>

    <!-- Circuit lines decorative -->
    <path d="M10 280 L50 280 L60 290" stroke="rgba(34,211,238,0.25)" stroke-width="1" fill="none"/>
    <circle cx="10" cy="280" r="3" fill="rgba(34,211,238,0.4)"/>
    <path d="M200 250 L160 250 L150 260" stroke="rgba(34,211,238,0.25)" stroke-width="1" fill="none"/>
    <circle cx="200" cy="250" r="3" fill="rgba(34,211,238,0.4)"/>
    <path d="M-10 350 L40 350 L55 365" stroke="rgba(34,211,238,0.15)" stroke-width="1" fill="none"/>
    <path d="M215 380 L165 380 L150 395" stroke="rgba(34,211,238,0.15)" stroke-width="1" fill="none"/>
  </g>

  <!-- Floating data tags -->
  <g transform="translate(460, 160)">
    <rect x="0" y="0" width="110" height="44" rx="8" fill="rgba(15,23,42,0.8)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
    <circle cx="16" cy="22" r="5" fill="#22d3ee" opacity="0.8"/>
    <rect x="28" y="14" width="50" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="28" y="25" width="35" height="5" rx="2.5" fill="rgba(34,211,238,0.3)"/>
  </g>
  <g transform="translate(20, 280)">
    <rect x="0" y="0" width="110" height="44" rx="8" fill="rgba(15,23,42,0.8)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
    <circle cx="16" cy="22" r="5" fill="#06b6d4" opacity="0.8"/>
    <rect x="28" y="14" width="55" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="28" y="25" width="40" height="5" rx="2.5" fill="rgba(34,211,238,0.3)"/>
  </g>
  <g transform="translate(450, 440)">
    <rect x="0" y="0" width="110" height="44" rx="8" fill="rgba(15,23,42,0.8)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
    <circle cx="16" cy="22" r="5" fill="#22d3ee" opacity="0.6"/>
    <rect x="28" y="14" width="45" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="28" y="25" width="60" height="5" rx="2.5" fill="rgba(34,211,238,0.25)"/>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="noseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="finGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="boosterGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <radialGradient id="windowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </radialGradient>
    <radialGradient id="windowInner" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </radialGradient>
    <linearGradient id="flameOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
