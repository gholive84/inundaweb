<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" fill="none">
  <!-- Background -->
  <rect width="900" height="560" fill="#080f1c"/>

  <!-- Grid lines -->
  <line x1="0" y1="140" x2="900" y2="140" stroke="rgba(34,211,238,0.04)" stroke-width="1"/>
  <line x1="0" y1="280" x2="900" y2="280" stroke="rgba(34,211,238,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="900" y2="420" stroke="rgba(34,211,238,0.04)" stroke-width="1"/>
  <line x1="225" y1="0" x2="225" y2="560" stroke="rgba(34,211,238,0.04)" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="560" stroke="rgba(34,211,238,0.04)" stroke-width="1"/>
  <line x1="675" y1="0" x2="675" y2="560" stroke="rgba(34,211,238,0.04)" stroke-width="1"/>

  <!-- Glow center -->
  <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="450" cy="280" rx="300" ry="200" fill="url(#centerGlow)"/>

  <!-- Neural network connections -->
  <!-- Layer 1 → Layer 2 -->
  <line x1="180" y1="140" x2="340" y2="180" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <line x1="180" y1="140" x2="340" y2="280" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <line x1="180" y1="140" x2="340" y2="380" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>
  <line x1="180" y1="280" x2="340" y2="180" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <line x1="180" y1="280" x2="340" y2="280" stroke="rgba(34,211,238,0.18)" stroke-width="1"/>
  <line x1="180" y1="280" x2="340" y2="380" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <line x1="180" y1="420" x2="340" y2="280" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <line x1="180" y1="420" x2="340" y2="380" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>

  <!-- Layer 2 → Layer 3 -->
  <line x1="340" y1="180" x2="500" y2="140" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <line x1="340" y1="180" x2="500" y2="240" stroke="rgba(34,211,238,0.18)" stroke-width="1.5"/>
  <line x1="340" y1="180" x2="500" y2="340" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>
  <line x1="340" y1="280" x2="500" y2="140" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>
  <line x1="340" y1="280" x2="500" y2="240" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <line x1="340" y1="280" x2="500" y2="340" stroke="rgba(34,211,238,0.2)" stroke-width="1.5"/>
  <line x1="340" y1="280" x2="500" y2="430" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <line x1="340" y1="380" x2="500" y2="240" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <line x1="340" y1="380" x2="500" y2="340" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <line x1="340" y1="380" x2="500" y2="430" stroke="rgba(34,211,238,0.18)" stroke-width="1.5"/>

  <!-- Layer 3 → Layer 4 -->
  <line x1="500" y1="140" x2="660" y2="180" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <line x1="500" y1="140" x2="660" y2="280" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>
  <line x1="500" y1="240" x2="660" y2="180" stroke="rgba(34,211,238,0.18)" stroke-width="1.5"/>
  <line x1="500" y1="240" x2="660" y2="280" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <line x1="500" y1="340" x2="660" y2="280" stroke="rgba(34,211,238,0.2)" stroke-width="1.5"/>
  <line x1="500" y1="340" x2="660" y2="380" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <line x1="500" y1="430" x2="660" y2="280" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>
  <line x1="500" y1="430" x2="660" y2="380" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>

  <!-- Layer 4 → output -->
  <line x1="660" y1="180" x2="780" y2="280" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <line x1="660" y1="280" x2="780" y2="280" stroke="rgba(34,211,238,0.25)" stroke-width="2"/>
  <line x1="660" y1="380" x2="780" y2="280" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>

  <!-- Nodes Layer 1 -->
  <circle cx="180" cy="140" r="10" fill="#0f172a" stroke="rgba(34,211,238,0.4)" stroke-width="1.5"/>
  <circle cx="180" cy="140" r="5" fill="rgba(34,211,238,0.3)"/>
  <circle cx="180" cy="280" r="12" fill="#0f172a" stroke="rgba(34,211,238,0.6)" stroke-width="2"/>
  <circle cx="180" cy="280" r="6" fill="rgba(34,211,238,0.5)"/>
  <circle cx="180" cy="420" r="10" fill="#0f172a" stroke="rgba(34,211,238,0.4)" stroke-width="1.5"/>
  <circle cx="180" cy="420" r="5" fill="rgba(34,211,238,0.3)"/>

  <!-- Nodes Layer 2 -->
  <circle cx="340" cy="180" r="10" fill="#0f172a" stroke="rgba(34,211,238,0.45)" stroke-width="1.5"/>
  <circle cx="340" cy="180" r="5" fill="rgba(34,211,238,0.35)"/>
  <circle cx="340" cy="280" r="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="340" cy="280" r="7" fill="rgba(34,211,238,0.6)"/>
  <circle cx="340" cy="380" r="10" fill="#0f172a" stroke="rgba(34,211,238,0.45)" stroke-width="1.5"/>
  <circle cx="340" cy="380" r="5" fill="rgba(34,211,238,0.35)"/>

  <!-- Nodes Layer 3 -->
  <circle cx="500" cy="140" r="10" fill="#0f172a" stroke="rgba(34,211,238,0.4)" stroke-width="1.5"/>
  <circle cx="500" cy="140" r="5" fill="rgba(34,211,238,0.3)"/>
  <circle cx="500" cy="240" r="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="500" cy="240" r="7" fill="rgba(34,211,238,0.6)"/>
  <circle cx="500" cy="340" r="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2.5"/>
  <circle cx="500" cy="340" r="8" fill="rgba(34,211,238,0.7)"/>
  <circle cx="500" cy="430" r="10" fill="#0f172a" stroke="rgba(34,211,238,0.4)" stroke-width="1.5"/>
  <circle cx="500" cy="430" r="5" fill="rgba(34,211,238,0.3)"/>

  <!-- Nodes Layer 4 -->
  <circle cx="660" cy="180" r="10" fill="#0f172a" stroke="rgba(34,211,238,0.45)" stroke-width="1.5"/>
  <circle cx="660" cy="180" r="5" fill="rgba(34,211,238,0.35)"/>
  <circle cx="660" cy="280" r="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="660" cy="280" r="7" fill="rgba(34,211,238,0.55)"/>
  <circle cx="660" cy="380" r="10" fill="#0f172a" stroke="rgba(34,211,238,0.45)" stroke-width="1.5"/>
  <circle cx="660" cy="380" r="5" fill="rgba(34,211,238,0.35)"/>

  <!-- Output node (grande, destaque) -->
  <circle cx="780" cy="280" r="22" fill="#0f172a" stroke="rgba(34,211,238,0.8)" stroke-width="2.5"/>
  <circle cx="780" cy="280" r="14" fill="rgba(34,211,238,0.15)"/>
  <circle cx="780" cy="280" r="8" fill="rgba(34,211,238,0.5)"/>
  <!-- Glow no output -->
  <circle cx="780" cy="280" r="32" fill="none" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <circle cx="780" cy="280" r="44" fill="none" stroke="rgba(34,211,238,0.06)" stroke-width="1"/>

  <!-- Label "INPUT" -->
  <text x="100" y="140" font-family="Inter, sans-serif" font-size="10" fill="rgba(34,211,238,0.35)" text-anchor="middle" letter-spacing="2">INPUT</text>
  <text x="100" y="280" font-family="Inter, sans-serif" font-size="10" fill="rgba(34,211,238,0.35)" text-anchor="middle" letter-spacing="2">INPUT</text>
  <text x="100" y="420" font-family="Inter, sans-serif" font-size="10" fill="rgba(34,211,238,0.35)" text-anchor="middle" letter-spacing="2">INPUT</text>
  <text x="840" y="284" font-family="Inter, sans-serif" font-size="10" fill="rgba(34,211,238,0.5)" text-anchor="middle" letter-spacing="2">OUT</text>

  <!-- Tags flutuantes -->
  <g transform="translate(60, 30)">
    <rect width="130" height="38" rx="6" fill="rgba(15,23,42,0.9)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
    <circle cx="16" cy="19" r="5" fill="#22d3ee" opacity="0.7"/>
    <text x="28" y="14" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">MODELO</text>
    <text x="28" y="27" font-family="Inter, sans-serif" font-size="10" fill="rgba(34,211,238,0.8)" font-weight="600">GPT-4o + Claude</text>
  </g>
  <g transform="translate(690, 30)">
    <rect width="140" height="38" rx="6" fill="rgba(15,23,42,0.9)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
    <circle cx="16" cy="19" r="5" fill="#22d3ee" opacity="0.7"/>
    <text x="28" y="14" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">RESULTADO</text>
    <text x="28" y="27" font-family="Inter, sans-serif" font-size="10" fill="rgba(34,211,238,0.8)" font-weight="600">Site em dias</text>
  </g>
  <g transform="translate(360, 470)">
    <rect width="160" height="38" rx="6" fill="rgba(15,23,42,0.9)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
    <circle cx="16" cy="19" r="5" fill="#06b6d4" opacity="0.7"/>
    <text x="28" y="14" font-family="Inter, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">TECNOLOGIA</text>
    <text x="28" y="27" font-family="Inter, sans-serif" font-size="10" fill="rgba(34,211,238,0.8)" font-weight="600">WordPress + IA</text>
  </g>

  <!-- Stars -->
  <circle cx="50" cy="50" r="1.5" fill="#22d3ee" opacity="0.4"/>
  <circle cx="820" cy="80" r="1" fill="white" opacity="0.3"/>
  <circle cx="870" cy="480" r="1.5" fill="#22d3ee" opacity="0.3"/>
  <circle cx="30" cy="500" r="1" fill="white" opacity="0.2"/>
  <circle cx="440" cy="30" r="1" fill="#22d3ee" opacity="0.3"/>
  <circle cx="750" cy="530" r="1.5" fill="white" opacity="0.2"/>
</svg>
